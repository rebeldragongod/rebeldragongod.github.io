  <!-- Quote script -->
  <script>
async function getDailyQuote() {
  const el = document.getElementById("quote");

  if (!el) {
    console.error("Quote element not found");
    return;
  }

  const today = new Date().toDateString();
  const saved = localStorage.getItem("dailyQuote");

  // Use saved quote if it's today
  if (saved) {
    const parsed = JSON.parse(saved);
    if (parsed.date === today) {
      el.innerHTML = parsed.quote;
      return;
    }
  }

  // Backup quotes (ALWAYS works)
  const fallbackQuotes = [
    `"Be yourself; everyone else is already taken."<br>— Oscar Wilde`,
    `"Do what you can, with what you have."<br>— Theodore Roosevelt`,
    `"Success is not final, failure is not fatal."<br>— Winston Churchill`,
    `"You miss 100% of the shots you don’t take."<br>— Wayne Gretzky`
  ];

  try {
    console.log("Fetching quote...");

    const res = await fetch("https://api.allorigins.win/raw?url=https://zenquotes.io/api/random");

    if (!res.ok) throw new Error("Network response not ok");

    const data = await res.json();

    const quoteText = `"${data[0].q}"<br>— ${data[0].a}`;
    el.innerHTML = quoteText;

    localStorage.setItem("dailyQuote", JSON.stringify({
      date: today,
      quote: quoteText
    }));

    console.log("Quote loaded from API");

  } catch (err) {
    console.error("API failed:", err);

    // Use fallback
    const index = Math.floor(Date.now() / (1000 * 60 * 60 * 24)) % fallbackQuotes.length;
    const quoteText = fallbackQuotes[index];

    el.innerHTML = quoteText;

    localStorage.setItem("dailyQuote", JSON.stringify({
      date: today,
      quote: quoteText
    }));

    console.log("Using fallback quote");
  }
}

getDailyQuote();
</script>
