<!DOCTYPE html>
<html>
<head>
  <title>Daily Quote</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1e1e1e;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #quote {
      font-size: 28px;
      max-width: 700px;
      padding: 20px;
      line-height: 1.5;
    }

    .author {
      margin-top: 15px;
      font-size: 18px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div>
    <div id="quote">Loading quote...</div>
    <div id="author"></div>
  </div>

  <script>
    async function loadQuote() {
      const quoteEl = document.getElementById("quote");
      const authorEl = document.getElementById("author");

      const fallback = [
        { q: "Be yourself; everyone else is already taken.", a: "Oscar Wilde" },
        { q: "Do what you can, with what you have.", a: "Theodore Roosevelt" },
        { q: "Success is not final, failure is not fatal.", a: "Winston Churchill" }
      ];

      try {
        const res = await fetch("https://api.quotable.io/random?tags=inspirational|life");
        const data = await res.json();

        quoteEl.innerText = `"${data.content}"`;
        authorEl.innerText = `— ${data.author}`;

      } catch (err) {
        console.log("API failed, using fallback");

        const pick = fallback[Math.floor(Math.random() * fallback.length)];
        quoteEl.innerText = `"${pick.q}"`;
        authorEl.innerText = `— ${pick.a}`;
      }
    }

    loadQuote();
  </script>

</body>
</html>
