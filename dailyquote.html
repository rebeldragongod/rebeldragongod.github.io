<!DOCTYPE html>
<html>
<head>
  <title>Daily Quote</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NS4WN208Q8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NS4WN208Q8');
  </script>

  <style>
    body {
      overflow-x: hidden;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: white;
    }

    .container {
      max-width: 720px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: #787878;
      color: white;
      padding: 5px 8px;
      font-size: 16px;
      border-radius: 10px;
      margin: 5px;
    }

    .quote-wrapper {
      height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #quote {
      font-size: 28px;
      max-width: 700px;
      line-height: 1.5;
      text-align: center;
    }

    #author {
      margin-top: 15px;
      opacity: 0.7;
    }

    #authorImg {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin-top: 20px;
      object-fit: cover;
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <a href="index.html" class="btn">Home</a>
    <a href="page1.html" class="btn">Contact Us</a>
    <h1>Daily Quote</h1>
  </div>

  <div class="quote-wrapper">
    <div>
      <div id="quote">Loading...</div>
      <div id="author"></div>
      <img id="authorImg">
    </div>
  </div>

<script>
const quoteEl = document.getElementById("quote");
const authorEl = document.getElementById("author");
const imgEl = document.getElementById("authorImg");

function getToday() {
  return new Date().toISOString().split("T")[0];
}

async function loadQuote() {
  const today = getToday();

  let saved = null;

  try {
    saved = JSON.parse(localStorage.getItem("dailyQuote"));
  } catch (e) {
    saved = null;
  }

  if (saved && saved.date === today && saved.quote) {
    await displayQuote(saved.quote);
    return;
  }

  try {
    const res = await fetch("https://aistuff.rebe1dragon1000.workers.dev/");
    const data = await res.json();

    const quoteObj = {
      date: today,
      quote: data.quote
    };

    localStorage.setItem("dailyQuote", JSON.stringify(quoteObj));

    await displayQuote(data.quote);

  } catch (err) {
    console.error("Error fetching quote:", err);
    quoteEl.innerText = "Failed to load quote.";
  }
}

// 🧠 Wikipedia image fetch
async function getWikiImage(author) {
  try {
    const url = `https://en.wikipedia.org/w/api.php?action=query&format=json&prop=pageimages&piprop=thumbnail&pithumbsize=300&titles=${encodeURIComponent(author)}&origin=*`;

    const res = await fetch(url);
    const data = await res.json();

    const pages = data.query.pages;
    const page = Object.values(pages)[0];

    return page?.thumbnail?.source || null;

  } catch (err) {
    console.error("Wiki error:", err);
    return null;
  }
}

// 💡 Display quote + image
async function displayQuote(text) {
  const parts = text.split("—");

  const quote = parts[0].trim();
  const author = parts[1]?.trim() || "Unknown";

  quoteEl.innerText = `"${quote}"`;
  authorEl.innerText = `— ${author}`;

  // reset image
  imgEl.style.display = "none";
  imgEl.src = "";

  const img = await getWikiImage(author);

  if (img) {
    imgEl.src = img;
    imgEl.style.display = "block";
  }
}

loadQuote();
</script>

<script src="mesh.js"></script>

</body>
</html>
