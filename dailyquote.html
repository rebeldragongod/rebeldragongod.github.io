<!DOCTYPE html>
<html>
<head>
    <title>AI Daily Quote</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NS4WN208Q8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NS4WN208Q8');
    </script>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #1e1e1e;
        color: white;
      }

      .container {
        max-width: 720px;
        margin: auto;
        padding: 20px;
        text-align: center;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        background: #787878;
        color: white;
        padding: 6px 10px;
        border-radius: 10px;
        margin: 5px;
      }

      .quote-wrapper {
        height: 65vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      #quote {
        font-size: 28px;
        max-width: 700px;
        line-height: 1.4;
      }

      #author {
        margin-top: 15px;
        opacity: 0.7;
      }

      #loading {
        opacity: 0.6;
        margin-top: 10px;
      }
    </style>
</head>

<body>

  <div class="container">
    <a href="index.html" class="btn">Home</a>
    <a href="page1.html" class="btn">Contact Us</a>

    <h1>AI Quote Generator</h1>
  </div>

  <div class="quote-wrapper">
    <div>
      <div id="quote">Loading AI quote...</div>
      <div id="author"></div>
      <div id="loading"></div>
    </div>
  </div>

  <script>
    async function loadAIQuote() {
      const quoteEl = document.getElementById("quote");
      const authorEl = document.getElementById("author");
      const loadingEl = document.getElementById("loading");

      loadingEl.innerText = "Generating AI quote...";

      try {
        const res = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer 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"
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [
              {
                role: "user",
                content: "Generate a short inspirational quote. Only return the quote and the author in format: QUOTE — AUTHOR. Make it unique and human-like."
              }
            ]
          })
        });

        const data = await res.json();
        const text = data.choices[0].message.content;

        const parts = text.split("—");

        quoteEl.innerText = parts[0]?.trim() || text;
        authorEl.innerText = parts[1]?.trim() || "";

        loadingEl.innerText = "";

      } catch (err) {
        console.error(err);
        quoteEl.innerText = "AI failed to generate quote.";
        authorEl.innerText = "";
        loadingEl.innerText = "";
      }
    }

    loadAIQuote();
  </script>

  <script src="mesh.js"></script>

</body>
</html>
