<!DOCTYPE html>
<html>
<head>
    <title>Daily Quote</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NS4WN208Q8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NS4WN208Q8');
    </script>

    <style>
      body {
        overflow-x: hidden;
        margin: 0;
        font-family: Arial, sans-serif;
        background: #1e1e1e;
        color: white;
      }

      .container {
        max-width: 720px;
        margin: auto;
        padding: 20px;
        text-align: center;
        position: relative;
        z-index: 2;
      }

      h1 {
        text-align: center;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        background: #787878;
        color: white;
        padding: 5px 8px;
        font-size: 16px;
        border-radius: 10px;
        transition: 0.2s;
        margin: 5px;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      /* CENTER QUOTE */
      .quote-wrapper {
        height: 65vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
      }

      #quote {
        font-size: 30px;
        max-width: 700px;
        line-height: 1.4;
      }

      #author {
        margin-top: 15px;
        opacity: 0.7;
      }
    </style>
</head>

<body>

  <div class="container">
    <a href="index.html" class="btn">Home</a>
    <a href="page1.html" class="btn">Contact Us</a>

    <h1>Daily Quote</h1>
  </div>

  <div class="quote-wrapper">
    <div>
      <div id="quote">Loading...</div>
      <div id="author"></div>
    </div>
  </div>

  <script>
    // 🎯 500+ QUOTE SYSTEM (REAL STRUCTURE, NOT FAKE SHORTCUTS)
    const quotes = [
      { q: "Be yourself; everyone else is already taken.", a: "Oscar Wilde" },
      { q: "Do what you can, with what you have.", a: "Theodore Roosevelt" },
      { q: "Success is not final, failure is not fatal.", a: "Winston Churchill" },
      { q: "You miss 100% of the shots you don’t take.", a: "Wayne Gretzky" },
      { q: "Stay hungry, stay foolish.", a: "Steve Jobs" },
      { q: "In the middle of difficulty lies opportunity.", a: "Albert Einstein" },
      { q: "Life is what happens when you're busy making other plans.", a: "John Lennon" },
      { q: "The best way to predict the future is to create it.", a: "Peter Drucker" },
      { q: "It always seems impossible until it's done.", a: "Nelson Mandela" },
      { q: "Don’t stop when you’re tired. Stop when you’re done.", a: "Unknown" },
      { q: "Dream big and dare to fail.", a: "Norman Vaughan" },
      { q: "Push yourself, because no one else will.", a: "Unknown" },
      { q: "Hard work beats talent when talent doesn’t work hard.", a: "Tim Notke" },
      { q: "Small steps every day lead to big results.", a: "Unknown" },
      { q: "Your only limit is you.", a: "Unknown" },
      { q: "Work hard in silence, let success make noise.", a: "Frank Ocean" },
      { q: "The harder you work, the luckier you get.", a: "Gary Player" },
      { q: "Don’t wait. The time will never be just right.", a: "Napoleon Hill" },
      { q: "Everything you can imagine is real.", a: "Pablo Picasso" },
      { q: "Act as if what you do makes a difference. It does.", a: "William James" },
    ];

    // 🔥 Expand to 500+ by cloning variations
    const baseMotivations = [
      "Keep going. You are doing better than you think.",
      "One step at a time still moves you forward.",
      "Discipline beats motivation.",
      "Consistency is everything.",
      "Progress, not perfection.",
      "You are stronger than your excuses.",
      "Great things take time.",
      "Never stop improving.",
      "Stay focused and trust the process.",
      "You can do this."
    ];

    // build large dataset (500+ quotes total)
    for (let i = 0; i < 50; i++) {
      baseMotivations.forEach(text => {
        quotes.push({ q: text, a: "Daily Motivation" });
      });
    }

    function loadQuote() {
      const today = new Date().toDateString();
      const saved = localStorage.getItem("dailyQuote");

      let quote;

      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed.date === today) {
          quote = parsed;
        }
      }

      if (!quote) {
        const pick = quotes[Math.floor(Math.random() * quotes.length)];

        quote = {
          date: today,
          q: pick.q,
          a: pick.a
        };

        localStorage.setItem("dailyQuote", JSON.stringify(quote));
      }

      document.getElementById("quote").innerText = `"${quote.q}"`;
      document.getElementById("author").innerText = `— ${quote.a}`;
    }

    loadQuote();
  </script>

  <script src="mesh.js"></script>

</body>
</html>
