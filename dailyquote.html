    <style>
      body {
        overflow-x: hidden;
        margin: 0;
        font-family: Arial, sans-serif;

      .container {

        font-size: 28px;

<body>

  <div class="container">
    <a href="index.html" class="btn">Home</a>
    <a href="page1.html" class="btn">Contact Us</a>
    <h1>Daily Quote</h1>
  </div>

  <div class="quote-wrapper">
    <div>
      <div id="quote">Loading...</div>
      <div id="author"></div>
    </div>
  </div>

 <script>
const quoteEl = document.getElementById("quote");
const authorEl = document.getElementById("author");

function getToday() {
  return new Date().toISOString().split("T")[0]; // better than toDateString()
}

async function loadQuote() {
  const today = getToday();

  let saved = null;

  try {
    saved = JSON.parse(localStorage.getItem("dailyQuote"));
  } catch (e) {
    saved = null;
  }

  // ✅ Use cached quote if it's from today
  if (saved && saved.date === today && saved.quote) {
    displayQuote(saved.quote);
    return;
  }

  try {
    // 🔗 CALL YOUR CLOUDLFARE WORKER HERE
    const res = await fetch("https://aistuff.rebe1dragon1000.workers.dev/");
    const data = await res.json();

    // Save it
    const quoteObj = {
      date: today,
      quote: data.quote
    };

    localStorage.setItem("dailyQuote", JSON.stringify(quoteObj));

    displayQuote(data.quote);

  } catch (err) {
    console.error("Error fetching quote:", err);
    quoteEl.innerText = "Failed to load quote.";
  }
}

// 💡 Splits quote + author if possible
function displayQuote(text) {
  // Try to split "Quote — Author"
  const parts = text.split("—");

  if (parts.length > 1) {
    quoteEl.innerText = `"${parts[0].trim()}"`;
    authorEl.innerText = `— ${parts[1].trim()}`;
  } else {
    quoteEl.innerText = `"${text}"`;
    authorEl.innerText = "";
  }
}

loadQuote();
</script>
